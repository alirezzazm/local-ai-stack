<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DAZ — دستیار هوش مصنوعی فارسی</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">DAZ</div>
    <div class="sub">دستیار هوش مصنوعی فارسی</div>
    <div class="spacer"></div>
    <label class="model">
      مدل:
      <input id="model" value="daz" title="نام مدل در Ollama" />
    </label>
    <label class="tts" title="خواندن پاسخ با صدا">
      <input type="checkbox" id="tts" /> 🔊 صدا
    </label>
  </header>

  <main id="chat"></main>

  <div id="attach-bar" class="attach-bar hidden">
    <img id="attach-thumb" alt="" />
    <span id="attach-name"></span>
    <button id="attach-remove" title="حذف عکس">✕</button>
  </div>

  <form id="composer">
    <button type="button" id="img-btn" title="افزودن عکس">📷</button>
    <input type="file" id="img-input" accept="image/*" hidden />
    <button type="button" id="mic-btn" title="ورودی صوتی">🎤</button>
    <textarea id="input" rows="1" placeholder="پیامت را بنویس یا 🎤 را بزن…"></textarea>
    <button type="submit" id="send">ارسال</button>
  </form>

  <script src="app.js"></script>
</body>
</html>
