# Big-server stack: vLLM (GPU inference) + DAZ web UI.
# Needs Docker with the NVIDIA Container Toolkit.
#   docker compose -f docker-compose.vllm.yml up
services:
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      --served-model-name daz
      --max-model-len ${VLLM_MAXLEN:-8192}
      --enable-auto-tool-choice --tool-call-parser hermes
    ports: ["8000:8000"]
    deploy:
      resources:
        reservations:
          devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]
    volumes:
      - hf-cache:/root/.cache/huggingface

  daz:
    image: node:24-alpine
    working_dir: /app
    command: node webui/server.js
    environment:
      DAZ_BACKEND: openai
      OPENAI_BASE: http://vllm:8000/v1
      OPENAI_MODEL: daz
      DAZ_TOKEN: ${DAZ_TOKEN:-changeme}
      PORT: "8080"
    ports: ["8080:8080"]
    volumes:
      - ./:/app
    depends_on: [vllm]

volumes:
  hf-cache:
